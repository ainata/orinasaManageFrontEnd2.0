<div class="sm:p-6 w-full max-w-screen-xl mx-auto">
  <mat-card class="company-card">
    <div
      class="header p-4"
      style="
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        justify-content: space-between;
      "
    >
      <mat-form-field
        subscriptSizing="dynamic"
        appearance="outline"
        class="filter-field"
        style="flex: 1; min-width: 250px; max-width: 400px"
      >
        <mat-label>Rechercher</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nom" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <button
        (click)="addDepartment()"
        mat-flat-button
        color="accent"
        class="add-button"
        style="white-space: nowrap; height: 46px"
      >
        <mat-icon class="mr-2">add</mat-icon>
        {{ 'add_department' | translate }}
      </button>
    </div>

    <div class="table-container relative">
      <table mat-table [dataSource]="dataSource" matSort>
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <ng-container matColumnDef="code">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Code</th>
          <td mat-cell *matCellDef="let element">{{ element.code }}</td>
        </ng-container>

        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <ng-container matColumnDef="description">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Description</th>
          <td mat-cell *matCellDef="let element">{{ element.description }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef class="text-right">Action</th>
          <td mat-cell *matCellDef="let element" class="text-right">
            <button
              mat-icon-button
              class="bg-blue-90 hover:bg-blue-80 text-blue-10"
              (click)="edit(element.id)"
            >
              <mat-icon>edit</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>

      @if (isLoading()) {
        <div class="loading-shade">
          <mat-spinner diameter="40" />
        </div>
      }
    </div>
  </mat-card>
</div>
