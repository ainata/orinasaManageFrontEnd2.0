<page-header class="bg-blue-40" />
<div class="sm:p-6 w-full max-w-screen-xl mx-auto">
  <mat-card class="company-card">
    <div
      class="header p-4"
      style="
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 16px;
        justify-content: space-between;
      "
    >
      <!-- Search -->
      <mat-form-field
        subscriptSizing="dynamic"
        appearance="outline"
        class="filter-field"
        style="flex: 1; min-width: 250px; max-width: 400px"
      >
        <mat-label>Rechercher</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Nom, email, ville" />
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>

      <!-- Ajouter Button -->
      <button
        (click)="openAddCompanyModal()"
        mat-flat-button
        color="accent"
        class="add-button"
        style="white-space: nowrap; height: 46px"
      >
        <mat-icon class="mr-2">add</mat-icon>
        {{ 'add' | translate }}
      </button>
    </div>

    <div class="table-container">
      <table mat-table [dataSource]="dataSource" matSort>
        <!-- ID -->
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <!-- Name -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Nom</th>
          <td mat-cell *matCellDef="let element">{{ element.name }}</td>
        </ng-container>

        <!-- Email -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let element">{{ element.email }}</td>
        </ng-container>

        <!-- Phone -->
        <ng-container matColumnDef="phone">
          <th mat-header-cell *matHeaderCellDef>Téléphone</th>
          <td mat-cell *matCellDef="let element">{{ element.phone }}</td>
        </ng-container>

        <!-- City -->
        <ng-container matColumnDef="city">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Ville</th>
          <td mat-cell *matCellDef="let element">{{ element.city }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </table>
    </div>

    <mat-paginator [pageSize]="5"></mat-paginator>
  </mat-card>
</div>
